name: Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        name: Build Windows Release
        runs-on: windows-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: latest

            - name: Setup Node.js with pnpm cache
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  targets: x86_64-pc-windows-msvc

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"

            - name: Install frontend dependencies
              run: pnpm install

            - name: Setup .NET SDK and WiX
              run: |
                  Write-Host "📦 Installing .NET SDK and WiX..." -ForegroundColor Cyan
                  # .NET SDK is pre-installed on GitHub runners
                  dotnet tool install --global wix --version 5.0.2

                  # Ajouter les outils .NET au PATH
                  $dotnetTools = Join-Path $env:USERPROFILE ".dotnet\tools"
                  echo "$dotnetTools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

                  # Vérifier que WiX est accessible
                  $env:PATH = "$dotnetTools;$env:PATH"
                  wix --version
                  Write-Host "✅ WiX installed successfully" -ForegroundColor Green

            - name: Build Standard Release (GitHub Distribution)
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              run: |
                  Write-Host "🏗️ Building Standard (GitHub)..." -ForegroundColor Green
                  $env:TAURI_ENV_DISTRIBUTION = "github"
                  $env:TAURI_ENV_MS_STORE = $null
                  $env:TAURI_ENV_PORTABLE = $null
                  Write-Host "Variables: DISTRIBUTION=$env:TAURI_ENV_DISTRIBUTION, MS_STORE=$env:TAURI_ENV_MS_STORE, PORTABLE=$env:TAURI_ENV_PORTABLE" -ForegroundColor Yellow
                  .\scripts\build-release.ps1 standard

            - name: Build Portable Release (Portable Distribution)
              run: |
                  Write-Host "📦 Building Portable..." -ForegroundColor Green
                  $env:TAURI_ENV_PORTABLE = "true"
                  $env:TAURI_ENV_DISTRIBUTION = "github"
                  $env:TAURI_ENV_MS_STORE = $null
                  Write-Host "Variables: DISTRIBUTION=$env:TAURI_ENV_DISTRIBUTION, MS_STORE=$env:TAURI_ENV_MS_STORE, PORTABLE=$env:TAURI_ENV_PORTABLE" -ForegroundColor Yellow
                  .\scripts\build-release.ps1 portable

            - name: Build Microsoft Store Release (for internal use)
              run: |
                  # IMPORTANT: Définir explicitement les variables MS Store
                  $env:TAURI_ENV_MS_STORE = "true"
                  $env:TAURI_ENV_DISTRIBUTION = $null
                  $env:TAURI_ENV_PORTABLE = $null
                  Write-Host "🏪 Building Microsoft Store version..." -ForegroundColor Magenta
                  Write-Host "Variables: MS_STORE=$env:TAURI_ENV_MS_STORE, DISTRIBUTION=$env:TAURI_ENV_DISTRIBUTION" -ForegroundColor Yellow
                  .\scripts\build-release.ps1 msix

            - name: Rename Microsoft Store MSI for Release
              run: |
                  if (Test-Path "builds/MicrosoftStoreMSI") {
                      $storeMsi = Get-ChildItem "builds/MicrosoftStoreMSI/*.msi" | Select-Object -First 1
                      if ($storeMsi) {
                          $newName = "MultitoolV2-Installer-MSStore.msi"
                          $newPath = "builds/$newName"
                          Copy-Item $storeMsi.FullName -Destination $newPath
                          Write-Host "✅ Microsoft Store MSI copié vers: $newName" -ForegroundColor Green
                          
                          # Ajouter au fichier checksums
                          $hash = (Get-FileHash $newPath -Algorithm SHA256).Hash.ToLower()
                          Add-Content -Path "builds/checksums.txt" -Value "$hash  $newName"
                          Write-Host "✅ Checksum ajouté pour $newName" -ForegroundColor Green
                      }
                  }

            - name: Prepare Updater Artifacts
              run: |
                  Write-Host "=== Préparation des artifacts pour tauri-plugin-updater ===" -ForegroundColor Cyan

                  # Extraire la version du tag (enlever le 'v')
                  $version = "${{ github.ref_name }}" -replace '^v', ''
                  Write-Host "Version détectée: $version" -ForegroundColor Yellow

                  # Créer le fichier .msi.zip pour l'updater (format Tauri)
                  $msiPath = "builds/installer/MultitoolV2-Installer.msi"
                  if (Test-Path $msiPath) {
                      # Format attendu par Tauri: {app-name}_{version}_{arch}_{locale}.msi.zip
                      $zipName = "Multitool_${version}_x64_en-US.msi.zip"
                      $zipPath = "builds/$zipName"
                      
                      Write-Host "Création de $zipName pour tauri-plugin-updater..." -ForegroundColor Green
                      Compress-Archive -Path $msiPath -DestinationPath $zipPath -Force
                      
                      # Vérifier que le zip est créé
                      if (Test-Path $zipPath) {
                          $zipSize = (Get-Item $zipPath).Length
                          Write-Host "✅ Updater artifact créé: $zipName ($zipSize bytes)" -ForegroundColor Green
                          
                          # Ajouter le checksum du .msi.zip
                          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLower()
                          Add-Content -Path "builds/checksums.txt" -Value "$hash  $zipName"
                          Write-Host "✅ Checksum ajouté pour $zipName" -ForegroundColor Green
                      } else {
                          Write-Host "❌ Échec de création du .msi.zip" -ForegroundColor Red
                          exit 1
                      }
                  } else {
                      Write-Host "❌ MSI source introuvable: $msiPath" -ForegroundColor Red
                      exit 1
                  }

            - name: Verify Build Artifacts
              run: |
                  Write-Host "=== Vérification des artifacts de build ===" -ForegroundColor Cyan

                  if (Test-Path "builds/portable/MultitoolV2-Portable.exe") {
                    Write-Host "✅ Portable: $(Get-Item 'builds/portable/MultitoolV2-Portable.exe' | Select-Object -ExpandProperty Length) bytes" -ForegroundColor Green
                  } else {
                    Write-Host "❌ Portable manquant" -ForegroundColor Red
                    exit 1
                  }

                  if (Test-Path "builds/installer/MultitoolV2-Installer.msi") {
                    Write-Host "✅ Installer: $(Get-Item 'builds/installer/MultitoolV2-Installer.msi' | Select-Object -ExpandProperty Length) bytes" -ForegroundColor Green
                  } else {
                    Write-Host "❌ Installer manquant" -ForegroundColor Red
                    exit 1
                  }

                  # Vérifier le .msi.zip pour l'updater
                  $version = "${{ github.ref_name }}" -replace '^v', ''
                  $zipName = "Multitool_${version}_x64_en-US.msi.zip"
                  if (Test-Path "builds/$zipName") {
                    Write-Host "✅ Updater artifact: $(Get-Item "builds/$zipName" | Select-Object -ExpandProperty Length) bytes" -ForegroundColor Green
                  } else {
                    Write-Host "❌ Updater artifact (.msi.zip) manquant" -ForegroundColor Red
                    exit 1
                  }

                  if (Test-Path "builds/checksums.txt") {
                    Write-Host "✅ Checksums disponibles" -ForegroundColor Green
                    Write-Host "Contenu:" -ForegroundColor Yellow
                    Get-Content "builds/checksums.txt"
                  } else {
                    Write-Host "❌ Checksums manquants" -ForegroundColor Red
                    exit 1
                  }

                  # Vérification que Microsoft Store MSI est créé
                  if (Test-Path "builds/MultitoolV2-Installer-MSStore.msi") {
                    Write-Host "✅ MS Store MSI: $(Get-Item 'builds/MultitoolV2-Installer-MSStore.msi' | Select-Object -ExpandProperty Length) bytes" -ForegroundColor Green
                  } else {
                    Write-Host "❌ MS Store MSI manquant" -ForegroundColor Red
                    exit 1
                  }

            - name: Create Release Notes
              run: |
                  $version = "${{ github.ref_name }}"
                  $notes = @"
                  # MultitoolV2 $version

                  ## 🆕 Nouveautés

                  ### 🐧 Support Linux (Proton/Wine)

                  Star Citizen tourne sur Linux via Proton/Wine (Lutris, Steam). MultitoolV2 supporte désormais Linux nativement :

                  - ✅ **Traduction** : installation et mise à jour de la traduction française
                  - ✅ **Gestion des personnages** : lecture, duplication et suppression des presets locaux
                  - ✅ **Personnages en ligne** : téléchargement depuis Star Citizen Characters
                  - ✅ **Gestion du cache** : détection automatique dans le préfixe Wine (`drive_c/users/*/AppData/Local/Star Citizen/`)
                  - ✅ **Builds Linux** : paquets `.deb` et `.AppImage` disponibles dans cette release

                  > **Configuration requise sous Linux** : renseigner le chemin d'installation de Star Citizen dans les Préférences.

                  ---

                  ## 📥 Téléchargements

                  ### 🪟 Windows
                  | Fichier | Description |
                  |---|---|
                  | `MultitoolV2-Portable.exe` | **Recommandé** — aucune installation |
                  | `MultitoolV2-Installer.msi` | Installateur standard |
                  | `MultitoolV2-Installer-MSStore.msi` | Distribution Microsoft Store |

                  ### 🐧 Linux
                  | Fichier | Description |
                  |---|---|
                  | `MultitoolV2_amd64.deb` | Paquet Debian/Ubuntu |
                  | `MultitoolV2_amd64.AppImage` | Portable universel |

                  ---

                  ## ⚠️ Windows — Application non-signée

                  Cette application est **100% gratuite et open-source**. Les certificats de signature coûtent ~300€/an.
                  Si SmartScreen apparaît : **"Informations complémentaires"** → **"Exécuter quand même"**, ou utilisez la version Portable.

                  ## 🔄 Mise à jour automatique (Windows MSI uniquement)

                  - ✅ Vérification automatique au démarrage
                  - ✅ Téléchargement et installation en un clic

                  ## 🔐 Checksums SHA256 — Windows

                  ``````
                  $(Get-Content builds/checksums.txt -Raw)
                  ``````

                  ---
                  **Microsoft Store :** Une version signée par Microsoft est disponible séparément sur le Microsoft Store.
                  "@

                  $notes | Out-File -FilePath "RELEASE_NOTES.md" -Encoding utf8

            - name: Upload Release Assets (Public uniquement)
              uses: softprops/action-gh-release@v1
              with:
                  body_path: RELEASE_NOTES.md
                  files: |
                      builds/portable/MultitoolV2-Portable.exe
                      builds/installer/MultitoolV2-Installer.msi
                      builds/Multitool_*_x64_en-US.msi.zip
                      builds/MultitoolV2-Installer-MSStore.msi
                      builds/checksums.txt
                  prerelease: false
                  generate_release_notes: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build Summary
              run: |
                  Write-Host ""
                  Write-Host "🎉 RELEASE CRÉÉE AVEC SUCCÈS!" -ForegroundColor Green
                  Write-Host "Version: ${{ github.ref_name }}" -ForegroundColor Cyan
                  Write-Host ""
                  Write-Host "📦 Artifacts dans GitHub Release:" -ForegroundColor Yellow
                  Write-Host "  • MultitoolV2-Portable.exe (Recommandé)" -ForegroundColor White
                  Write-Host "  • MultitoolV2-Installer.msi (Standard)" -ForegroundColor White
                  $version = "${{ github.ref_name }}" -replace '^v', ''
                  Write-Host "  • Multitool_${version}_x64_en-US.msi.zip (Auto-updater)" -ForegroundColor Cyan
                  Write-Host "  • MultitoolV2-Installer-MSStore.msi (MS Store Distribution)" -ForegroundColor Magenta
                  Write-Host "  • checksums.txt" -ForegroundColor White
                  Write-Host ""
                  Write-Host "🔄 Mise à jour automatique:" -ForegroundColor Cyan
                  Write-Host "   Le fichier .msi.zip permet les mises à jour automatiques" -ForegroundColor White
                  Write-Host "   pour les utilisateurs de la version installateur MSI" -ForegroundColor White
                  Write-Host ""
                  Write-Host "🏪 Artifact MS Store Distribution:" -ForegroundColor Magenta
                  Write-Host "   MultitoolV2-Installer-MSStore.msi contient TAURI_ENV_MS_STORE=true" -ForegroundColor White
                  Write-Host "   → Page 'Mises à jour' masquée dans la sidebar" -ForegroundColor White
                  Write-Host "   → Warnings GitHub non-signé masqués" -ForegroundColor White
                  Write-Host ""
                  Write-Host "🌐 Release disponible sur:" -ForegroundColor Cyan
                  Write-Host "   https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" -ForegroundColor Blue

    build-linux:
        name: Build Linux Release
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install system dependencies (Tauri)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libssl-dev \
                    build-essential

            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: latest

            - name: Setup Node.js with pnpm cache
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"

            - name: Install frontend dependencies
              run: pnpm install

            - name: Build Linux Release
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              run: pnpm tauri build

            - name: Collect artifacts
              run: |
                  mkdir -p builds/linux

                  # DEB
                  DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
                  if [ -n "$DEB" ]; then
                      cp "$DEB" builds/linux/MultitoolV2_amd64.deb
                      echo "✓ DEB: $DEB"
                  fi

                  # AppImage
                  APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
                  if [ -n "$APPIMAGE" ]; then
                      cp "$APPIMAGE" builds/linux/MultitoolV2_amd64.AppImage
                      echo "✓ AppImage: $APPIMAGE"
                  fi

                  # Checksums
                  cd builds/linux
                  sha256sum * > checksums-linux.txt
                  cat checksums-linux.txt

            - name: Upload Linux artifacts to release
              uses: softprops/action-gh-release@v1
              with:
                  files: |
                      builds/linux/MultitoolV2_amd64.deb
                      builds/linux/MultitoolV2_amd64.AppImage
                      builds/linux/checksums-linux.txt
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
