name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

env:
    CARGO_TERM_COLOR: always

jobs:
    check-rust:
        name: Rust check & lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install system dependencies (Tauri)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libssl-dev \
                    build-essential

            - name: Install Rust (stable)
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"

            - name: cargo check
              working-directory: src-tauri
              run: cargo check

            - name: cargo clippy
              working-directory: src-tauri
              run: cargo clippy

    check-frontend:
        name: Frontend type check & build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: latest

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install

            - name: Type check & build
              run: pnpm build
